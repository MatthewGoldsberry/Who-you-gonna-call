<!DOCTYPE html>
<html>
<head>
    <title>Cincinnati Visual Disorder</title>
    <link rel="icon" href="data:;base64,iVBORwOKGO=" />
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="tooltip"></div>

    <div class="dashboard-container">

        <header class="dashboard-header">
            <div class="header-title-group">
                <h1>Visual Disorder in Cincinnati</h1>
                <span class="header-subtitle">As Documented Through 311 Non-Emergency Service Requests</span>
            </div>
            <p><i>Matthew Goldsberry & Isaac Dowdy</i></p>
        </header>
    
        <div class="map-zone">
            <div id="map-controls-top-left">
                <div class="dropdown-group">
                    <span class="dropdown-label">Color By:</span>
                    <select id="colorBy" class="dropdown-select">
                        <option value="serviceType">Service Type</option>
                        <option value="neighborhood">Neighborhood</option>
                        <option value="agency">Public Agency</option>
                        <option value="priority">Priority Level</option>
                        <option value="time">Time to Update</option>
                    </select>
                </div>

                <div class="dropdown-group">
                    <span class="dropdown-label">Map:</span>
                    <select id="mapBackground" class="dropdown-select">
                        <option value="street">Street</option>
                        <option value="satellite">Satellite</option>
                        <option value="topo">Topographic</option>
                        <option value="light">Minimal - Light</option>
                        <option value="dark">Minimal - Dark</option>
                    </select>
                </div>

                <button id="brushToggle" class="brush-button" type="button">Brush Mode: Off</button>
                <button id="heatmapToggle" class="heatmap-button" type="button">Heatmap: Off</button>

                <div id="service-type-legend"></div>
            </div>

            <div id="missing-data-note">
                <span id="unmapped-count">0</span> calls unmapped (missing GPS)
            </div>

            <div id="my-map"></div>
        </div>

        <div class="chart-column">
            <svg id="requests-per-neighborhood" class="chart-container"></svg>
            <svg id="request-methods" class="chart-container"></svg>
            <svg id="service-dept-distribution" class="chart-container"></svg>
            <svg id="priority-distribution" class="chart-container"></svg>
            <svg id="service-type-distribution" class="chart-container"></svg>
        </div>

        <div class="timeline-zone">
            <div id="timeline-chart"></div>
        </div>

    </div>

    <!-- Load js Scripts -->
    <script src="js/d3.v6.min.js"></script>
    <script src="js/leaflet.js"></script>
    <script src="js/interactions.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/main.js"></script>
    <script src="js/leafletMap.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/barchart.js"></script>
</body>
</html>
